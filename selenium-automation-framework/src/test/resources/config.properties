# ============================================
# config.properties - Central Configuration
# ============================================

# Browser Settings
browser=chrome
headless=false
implicit.wait=10
explicit.wait=20
page.load.timeout=30

# Application URL
app.url=https://www.linkedin.com

# LinkedIn Credentials
username=your_email@example.com
password=your_password

# Excel Data File Path
excel.file.path=src/test/resources/TestData.xlsx
excel.sheet.name=JobSearch

# Extent Report Settings
report.path=reports/ExtentReport.html
report.title=LinkedIn Job Search Automation
report.name=Test Execution Report

# API Settings (LinkedIn Jobs API or mock endpoint)
api.base.url=https://api.linkedin.com/v2
api.token=your_api_token_here
